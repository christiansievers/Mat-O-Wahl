<!DOCTYPE html>
<html lang="de">
<head>
  <title>File-O-Mat</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="system/bootstrap4/css/bootstrap.min.css">
  <script src="system/jquery3/jquery-3.4.1.min.js"></script>
  <script src="system/bootstrap4/js/bootstrap.min.js"></script>
  <script type="text/javascript" src="data/definition.js"></script>
  <script type="text/javascript" src="system/jquery.csv-0.8.9.min.js"></script>
  <script type="text/javascript" src="system/general.js"></script>
  <script type="text/javascript" src="system/output.js"></script>
  <script>
	for (i = 0; i<= design.length-1; i++) {
		document.writeln("<link rel='stylesheet' type='text/css' href='styles/"+design[i]+"' />");	
	}	
	for (i = 0; i<= addons.length-1; i++) {
		document.writeln(' <script type="text/javascript" src="'+addons[i]+'"><\/script> ');	
	}	
	document.writeln("<script type='text/javascript' src='i18n/i18n_"+language+".js'><\/script>");
  </script>
</head>
<body>

<div class="container container-fluid theme-showcase">
	<main>
		<section id="sectionDescription">
			<div class="row border border-dark rounded p-4 mb-3">
				<div class="col align-self-center">
					<div id="descriptionHeading1"><h1>File-O-Mat</h1></div>
					<div id="descriptionHeading2"><h2>Start</h2>
					<p>Dieses Skript stellt eine Reihe von Fragen, die dabei helfen, Dateiformate auf ihre Eignung zur Langzeitverfügbarkeit zu evaluieren.</p>
					</div>
					<div id="descriptionExplanation" class="lead"><p>Lade...</p></div>
					
					<div class="form-group mt-4">
						<label for="formatNote"><strong>Zu evaluierendes Dateiformat (z.B. PDF, TIFF, XML):</strong></label>
						<input type="text" class="form-control form-control-lg" id="formatNote" placeholder="Formatname oder Notiz hier eingeben...">
					</div>
					<div class="form-group mt-4">
						<p>Klicken Sie auf Start, um mit der Format-Evaluierung zu beginnen.</p>
					</div>
				</div>
			</div>
			<div class="row">							
				<div class="col">				
				    <button type="button" class="btn btn-primary btn-lg float-right" onclick="fnHideWelcomeMessage()" id="descriptionButtonStart">Start</button>
				</div>
			</div>
		</section>

		<section id="sectionShowQuestions">
			<div class="row" tabindex="0" style="margin-top: 1.0em;">
				<div class="col">
					<div class="card border-dark mb-3 bg-transparent">
					  <div class="card-header" id="showQuestionsHeader">Header</div>
					  <div class="card-body">
					    <p class="card-text lead" id="showQuestionsQuestion">Frage wird geladen...</p>
					    <p class="card-text text-muted small mt-2" id="showQuestionsExplanation" style="display: none;"></p>
					  </div>
					</div>					
				</div>
			</div>
		</section>
				
		<section id="sectionVotingButtons">
			<div id="dynamicVotingButtons" class="row">
            </div> 
		</section>
	</main>

	<section id="sectionResults">
		<div class="row" id="results">
			<div class="col">
				<div id="resultsHeading"><h2>Auswertung nach Kriterien</h2></div>
				<div id="resultsShort">
                </div>
				
				<div id="resultsDetailed" class="mt-5" style="display:none;">
                </div>
			</div>
		</div>
	</section>	
	
	<footer id="sectionFooter" class="mt-5">
		<div class="row">	
			<div class="col">
				<a class='btn btn-outline-dark btn-block btn-sm' role='button' href='index.html' id="restart">Neustart</a>
			</div>			
		</div>
	</footer>
</div>

<script type="text/javascript">
    $(document).ready(function() { 
        fnStart(); 		
    });
</script>	
</body>
</html>
